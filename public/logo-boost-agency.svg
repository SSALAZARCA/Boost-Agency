<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" width="160" height="100">
  <!-- Fondo transparente — hereda el color del header -->
  
  <!-- "B" grande -->
  <text
    x="10"
    y="90"
    font-family="'Noto Serif Display', Georgia, 'Times New Roman', serif"
    font-size="100"
    font-weight="400"
    fill="#F1EEE6"
    dominant-baseline="auto"
    letter-spacing="0"
  >B</text>

  <!-- "A" grande -->
  <text
    x="72"
    y="90"
    font-family="'Noto Serif Display', Georgia, 'Times New Roman', serif"
    font-size="100"
    font-weight="400"
    fill="#F1EEE6"
    dominant-baseline="auto"
  >A</text>

  <!-- "." pequeño al pie -->
  <text
    x="145"
    y="92"
    font-family="'Noto Serif Display', Georgia, 'Times New Roman', serif"
    font-size="60"
    font-weight="400"
    fill="#F1EEE6"
    dominant-baseline="auto"
  >.</text>
</svg>
